name: "Release"

on:
  push:
    branches:
      - main
    tags:
      - "v*" # 触发版本发布逻辑
  workflow_dispatch:

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install pandoc
        if: matrix.platform == 'windows-latest'
        run: choco install pandoc
      
      - name: install pandoc (ubuntu)
        if: matrix.platform == 'ubuntu-20.04'
        run: sudo apt-get install -y pandoc

      - name: install pandoc (macos)
        if: matrix.platform == 'macos-latest'
        run: brew install pandoc

      - name: install frontend dependencies
        run: npm install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # The version will be extracted from tauri.conf.json
          releaseName: "Pandoc Flow v__VERSION__"
          releaseBody: "See the assets below to download correct version for your OS."
          releaseDraft: true
          prerelease: false
