<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandoc Flow - 公文一键转换</title>
  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #0071e3;
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --text-soft: #86868b;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Myriad Set Pro", "SF Pro Icons", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .container {
      width: 400px;
      padding: 40px;
      background-color: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .container:hover {
      transform: scale(1.02);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--primary);
      font-weight: 600;
    }

    .header p {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 32px;
    }

    .drop-zone {
      border: 2px dashed #d2d2d7;
      border-radius: 16px;
      padding: 60px 20px;
      background-color: #fafafa;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    .drop-zone.hover {
      border-color: var(--accent);
      background-color: #f0f7ff;
    }

    .drop-zone .icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .drop-zone .label {
      font-weight: 500;
      color: var(--text);
    }

    .status-area {
      margin-top: 24px;
      min-height: 24px;
      font-size: 14px;
    }

    .status-success {
      color: #34c759;
    }

    .status-error {
      color: #ff3b30;
    }

    .status-processing {
      color: var(--accent);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #c7c7cc;
    }

    /* 简单的加载动画 */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 113, 227, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="header">
      <h1>Pandoc Flow</h1>
      <p> Markdown ➝ 公文 Word 一键转换</p>
    </div>
    
    <div class="drop-zone" id="drop-zone">
      <span class="icon">📄</span>
      <span class="label">拖入文件，即刻转换</span>
    </div>

    <div class="status-area" id="status">
      <!-- 动态显示状态 -->
      转换后的 Word 文档将生成在源文件同目录下
    </div>

    <div class="footer">
      符合 GB/T 9704-2012 国家标准
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const statusMsg = document.getElementById('status');
    const { invoke } = window.__TAURI__.tauri;
    const { listen } = window.__TAURI__.event;

    // 处理拖拽文件
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('hover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('hover');
    });

    dropZone.addEventListener('drop', async (e) => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      
      // 注意：Tauri 有专用的拖拽监听事件，但普通 HTML 拖拽也可获取路径 (如果是配置了权限)
      // 在 Tauri App 中，我们更倾向于监听其提供的 file-drop 事件
    });

    // 捕获 Tauri 的拖放事件
    listen('tauri://file-drop', async (event) => {
      const paths = event.payload;
      if (paths && paths.length > 0) {
        processFiles(paths);
      }
    });

    async function processFiles(paths) {
      for (const path of paths) {
        if (path.endsWith('.md')) {
          showProcessing(`正在转换: ${path.split(/[\\/]/).pop()}`);
          try {
            const result = await invoke('convert_markdown', { path });
            showSuccess(`转换成功：${result}`);
          } catch (err) {
            showError(`失败：${err}`);
          }
        } else {
          showError('⚠️ 请拖入 Markdown (.md) 文件');
        }
      }
    }

    function showProcessing(msg) {
      statusMsg.innerHTML = `<span class="spinner"></span><span class="status-processing">${msg}</span>`;
    }

    function showSuccess(msg) {
      statusMsg.innerHTML = `<span class="status-success">✅ ${msg}</span>`;
    }

    function showError(msg) {
      statusMsg.innerHTML = `<span class="status-error">${msg}</span>`;
    }

    // 处理来自主进程的拖入文件 (支持拖入图标运行模式)
    listen('initial-files', (event) => {
      const paths = event.payload;
      if (paths && paths.length > 0) {
        processFiles(paths);
      }
    });

  </script>
</body>
</html>
