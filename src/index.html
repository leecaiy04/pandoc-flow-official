<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandoc Flow - 公文一键转换</title>
  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #0071e3;
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --text-soft: #86868b;
      --danger: #ff3b30;
      --success: #34c759;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .container {
      width: 420px;
      padding: 40px;
      background-color: var(--card-bg);
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
      position: relative;
    }

    .header h1 {
      font-size: 26px;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 30px;
    }

    .drop-zone {
      border: 2px dashed #d2d2d7;
      border-radius: 20px;
      padding: 50px 20px;
      background-color: #fafafa;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .drop-zone.hover {
      border-color: var(--accent);
      background-color: #f0f7ff;
      transform: scale(1.02);
    }

    .template-box {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--text-soft);
      justify-content: center;
    }

    .btn-small {
      padding: 6px 12px;
      border-radius: 12px;
      border: none;
      background-color: #e8e8ed;
      color: var(--primary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-small:hover {
      background-color: #d2d2d7;
    }

    .status-area {
      margin-top: 24px;
      font-size: 13px;
      min-height: 20px;
    }

    .status-success { color: var(--success); font-weight: 500; }
    .status-error { color: var(--danger); }
    .status-processing { color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 113, 227, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .file-tag {
      display: inline-block;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: bottom;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Pandoc Flow</h1>
      <p> Markdown ➝ 国标公文 Word 转换</p>
    </div>
    
    <div class="drop-zone" id="drop-zone">
      <div style="font-size: 50px; margin-bottom: 12px;">📄</div>
      <div style="font-weight: 600; font-size: 16px;">将 .md 文件拖入此处</div>
      <div style="font-size: 12px; color: var(--text-soft); margin-top: 8px;">或点击选择文件</div>
    </div>

    <div class="template-box">
      <span>当前模板：</span>
      <span id="template-name" class="file-tag">内置默认模板</span>
      <button class="btn-small" id="select-template">更换</button>
      <button class="btn-small" id="reset-template" style="display: none;">重置</button>
    </div>

    <div class="status-area" id="status">
      输出文件将保存在源文件同级目录
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const statusMsg = document.getElementById('status');
    const tplNameDisp = document.getElementById('template-name');
    const btnSelectTpl = document.getElementById('select-template');
    const btnResetTpl = document.getElementById('reset-template');
    
    // Tauri v2 Global APIs
    const { emit, listen } = window.__TAURI__.event;
    const { open } = window.__TAURI__.dialog;

    let selectedTemplate = localStorage.getItem('custom_template_path') || null;
    updateTemplateUI();

    function updateTemplateUI() {
      if (selectedTemplate) {
        tplNameDisp.innerText = selectedTemplate.split(/[\\/]/).pop();
        tplNameDisp.title = selectedTemplate;
        btnResetTpl.style.display = 'inline-block';
      } else {
        tplNameDisp.innerText = '内置默认模板';
        btnResetTpl.style.display = 'none';
      }
    }

    // 更换模板
    btnSelectTpl.addEventListener('click', async () => {
      const selected = await open({
        multiple: false,
        filters: [
          { name: 'Word/Config', extensions: ['docx', 'yaml', 'yml'] }
        ]
      });
      if (selected) {
        selectedTemplate = typeof selected === 'string' ? selected : selected.path;
        localStorage.setItem('custom_template_path', selectedTemplate);
        updateTemplateUI();
      }
    });

    // 重置模板
    btnResetTpl.addEventListener('click', () => {
      selectedTemplate = null;
      localStorage.removeItem('custom_template_path');
      updateTemplateUI();
    });

    // Handle Drag Over
    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('hover');
    });

    window.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null) {
        dropZone.classList.remove('hover');
      }
    });

    // Click to select files
    dropZone.addEventListener('click', async () => {
      const selected = await open({
        multiple: true,
        filters: [{ name: 'Markdown', extensions: ['md'] }]
      });
      if (selected) {
        const paths = Array.isArray(selected) ? selected : [selected];
        processFiles(paths);
      }
    });

    // Handle Native File Drop
    listen('tauri://drag-drop', (event) => {
      dropZone.classList.remove('hover');
      const paths = event.payload.paths;
      if (paths && paths.length > 0) {
        processFiles(paths);
      }
    });

    // Startup files
    listen('initial-files', (event) => {
      processFiles(event.payload);
    });

    // 监听后端回复
    listen('markdown-conversion-response', (event) => {
      const { success, result, error } = event.payload;
      if (success) {
        statusMsg.innerHTML = `<span class="status-success">✅ 完成：${result}</span>`;
      } else {
        statusMsg.innerHTML = `<span class="status-error">❌ 错误：${error}</span>`;
      }
    });

    async function processFiles(paths) {
      if (!paths || paths.length === 0) return;
      
      for (const path of paths) {
        const normalizedPath = typeof path === 'string' ? path : path.path;
        if (normalizedPath.toLowerCase().endsWith('.md')) {
          statusMsg.innerHTML = `<span class="spinner"></span><span class="status-processing">转换中...</span>`;
          // 发送带有自定义模板路径的消息
          emit('markdown-conversion-request', { 
            path: normalizedPath,
            custom_template: selectedTemplate 
          });
        }
      }
    }
  </script>
</body>
</html>
