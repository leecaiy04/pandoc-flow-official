<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pandoc Flow - 公文一键转换</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-card" role="main">
      <header class="app-header">
        <h1>Pandoc Flow</h1>
        <p>Markdown → 国标公文 Word 转换</p>
      </header>

      <section
        class="drop-zone"
        id="drop-zone"
        tabindex="0"
        aria-label="拖入或点击选择 Markdown 文件"
      >
        <div class="drop-zone__icon" aria-hidden="true">📄</div>
        <p class="drop-zone__title">拖入或点击选择 Markdown 文档</p>
        <p class="drop-zone__subtitle">支持多个 .md 文件，输出位于同级目录</p>
      </section>

      <section class="template-box" aria-live="polite">
        <span>当前模板：</span>
        <span id="template-name" class="template-name" title="内置默认模板">
          内置默认模板
        </span>
        <button class="btn btn-secondary" id="select-template">更换</button>
        <button
          class="btn btn-secondary"
          id="reset-template"
          style="display: none"
        >
          重置
        </button>
      </section>

      <section class="status-panel" id="status">
        输出文件将保存在源文件同级目录
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
