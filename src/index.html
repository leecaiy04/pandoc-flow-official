<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandoc Flow - 公文一键转换</title>
  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #0071e3;
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --text-soft: #86868b;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Myriad Set Pro", "SF Pro Icons", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .container {
      width: 400px;
      padding: 40px;
      background-color: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .header p {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 32px;
    }

    .drop-zone {
      border: 2px dashed #d2d2d7;
      border-radius: 16px;
      padding: 60px 20px;
      background-color: #fafafa;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .drop-zone.hover {
      border-color: var(--accent);
      background-color: #f0f7ff;
    }

    .status-area {
      margin-top: 24px;
      font-size: 14px;
    }

    .status-success { color: #34c759; }
    .status-error { color: #ff3b30; }
    .status-processing { color: var(--accent); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 113, 227, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Pandoc Flow</h1>
      <p>Markdown ➝ 公文 Word 一键转换</p>
    </div>
    
    <div class="drop-zone" id="drop-zone">
      <span style="font-size: 48px; display: block; margin-bottom: 16px;">📄</span>
      <span style="font-weight: 500;">拖入文件，即刻转换</span>
    </div>

    <div class="status-area" id="status">
      生成的 Word 将保存在源文件同目录下
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const statusMsg = document.getElementById('status');
    
    // Tauri v2 Global APIs
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const { open } = window.__TAURI__.dialog;

    // Handle Drag Over
    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('hover');
    });

    window.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null) {
        dropZone.classList.remove('hover');
      }
    });

    // Fallback: Click to select file
    dropZone.addEventListener('click', async () => {
      try {
        const selected = await open({
          multiple: true,
          filters: [{ name: 'Markdown', extensions: ['md'] }]
        });
        if (selected && selected.length > 0) {
          processFiles(selected);
        }
      } catch (err) {
        console.error('File dialog failed:', err);
      }
    });

    // Handle Native File Drop
    listen('tauri://drag-drop', (event) => {
      console.log('Drop event:', event);
      dropZone.classList.remove('hover');
      const paths = event.payload.paths;
      if (paths && paths.length > 0) {
        processFiles(paths);
      }
    });

    // Startup files
    listen('initial-files', (event) => {
      processFiles(event.payload);
    });

    async function processFiles(paths) {
      if (!paths || paths.length === 0) return;
      
      for (const path of paths) {
        const fileName = typeof path === 'string' ? path : path.path;
        const normalizedPath = typeof path === 'string' ? path : path.path;

        if (normalizedPath.toLowerCase().endsWith('.md')) {
          statusMsg.innerHTML = `<span class="spinner"></span><span class="status-processing">正在转换... ${normalizedPath.split(/[\\/]/).pop()}</span>`;
          try {
            const result = await invoke('convert_markdown', { path: normalizedPath });
            statusMsg.innerHTML = `<span class="status-success">✅ 成功：${result}</span>`;
          } catch (err) {
            statusMsg.innerHTML = `<span class="status-error">❌ 错误：${err}</span>`;
          }
        } else {
          statusMsg.innerHTML = `<span class="status-error">⚠️ 请拖入 Markdown 文件</span>`;
        }
      }
    }
  </script>
</body>
</html>
